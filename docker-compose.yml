version: '3.8'

services:

  # ─── Databases ───────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reclaim
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  # ─── Backend Services ─────────────────────────────────────

  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file: .env
    depends_on:
      - mongodb

  user-service:
    build: ./services/user-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    env_file: .env
    depends_on:
      - postgres

  listing-service:
    build: ./services/listing-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    env_file: .env
    depends_on:
      - postgres

  media-service:
    build: ./services/media-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    env_file: .env
    depends_on:
      - postgres
      - minio

  match-service:
    build: ./services/match-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    env_file: .env
    depends_on:
      - postgres

  claim-service:
    build: ./services/claim-service
    restart: unless-stopped
    ports:
      - "4006:4006"
    env_file: .env
    depends_on:
      - postgres

  chat-service:
    build: ./services/chat-service
    restart: unless-stopped
    ports:
      - "4007:4007"
    env_file: .env
    depends_on:
      - postgres

  notification-service:
    build: ./services/notification-service
    restart: unless-stopped
    ports:
      - "4008:4008"
    env_file: .env
    depends_on:
      - postgres

  search-service:
    build: ./services/search-service
    restart: unless-stopped
    ports:
      - "4009:4009"
    env_file: .env
    depends_on:
      - postgres

  admin-service:
    build: ./services/admin-service
    restart: unless-stopped
    ports:
      - "4010:4010"
    env_file: .env
    depends_on:
      - postgres

  resolution-service:
    build: ./services/resolution-service
    restart: unless-stopped
    ports:
      - "4011:4011"
    env_file: .env
    depends_on:
      - postgres

  # ─── Frontend ─────────────────────────────────────────────

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - auth-service
      - listing-service

volumes:
  postgres-data:
  mongo-data:
  minio-data: